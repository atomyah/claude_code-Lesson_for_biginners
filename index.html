<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo リスト</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <style>
    .sortable-ghost { opacity: 0.3; }
    .sortable-chosen { cursor: grabbing; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="max-w-xl mx-auto px-4 py-8">

    <!-- ヘッダー -->
    <header class="mb-8 flex items-center gap-3">
      <h1 class="text-2xl font-bold text-gray-800">ToDo リスト</h1>
      <span id="task-count-badge"
        class="bg-blue-500 text-white text-sm font-bold px-2.5 py-0.5 rounded-full">0</span>
    </header>

    <!-- 追加フォーム -->
    <div class="bg-white rounded-xl shadow border border-gray-300 p-4 mb-6">
      <input
        id="title-input"
        type="text"
        placeholder="タスクを入力..."
        class="w-full text-base text-gray-800 placeholder-gray-400 bg-transparent border-none outline-none"
      />
      <textarea
        id="memo-input"
        placeholder="メモを追加..."
        rows="2"
        class="w-full text-sm text-gray-600 placeholder-gray-400 bg-transparent border-none outline-none resize-none mt-2"
        style="display: none;"
      ></textarea>
      <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-200">
        <button id="memo-toggle"
          class="text-sm text-gray-500 hover:text-blue-600 transition-colors font-medium">
          ＋ メモを追加
        </button>
        <button id="add-btn"
          class="bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white text-sm font-medium px-5 py-1.5 rounded-lg transition-colors">
          追加
        </button>
      </div>
    </div>

    <!-- 検索バー -->
    <div class="relative mb-4">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"
        width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        id="search-input"
        type="text"
        placeholder="タスクを検索..."
        class="w-full pl-9 pr-4 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-800 placeholder-gray-400 outline-none focus:ring-2 focus:ring-blue-400 transition"
      />
    </div>

    <!-- フィルタータブ -->
    <div class="flex border-b border-gray-300 mb-4">
      <button data-filter="all"
        class="filter-tab px-4 py-2 text-sm border-b-2 border-transparent hover:text-gray-700 transition-colors">
        全て
      </button>
      <button data-filter="active"
        class="filter-tab px-4 py-2 text-sm border-b-2 border-transparent hover:text-gray-700 transition-colors">
        未完了
      </button>
      <button data-filter="completed"
        class="filter-tab px-4 py-2 text-sm border-b-2 border-transparent hover:text-gray-700 transition-colors">
        完了
      </button>
    </div>

    <!-- タスクリスト -->
    <div id="task-list" class="space-y-2"></div>

  </div>

  <script>
  (function () {
    'use strict';

    const STORAGE_KEY = 'todo-tasks';

    let tasks = [];
    let currentFilter = 'all';
    let searchQuery = '';
    let memoVisible = false;

    const elTaskList       = document.getElementById('task-list');
    const elTitleInput     = document.getElementById('title-input');
    const elMemoInput      = document.getElementById('memo-input');
    const elMemoToggle     = document.getElementById('memo-toggle');
    const elAddBtn         = document.getElementById('add-btn');
    const elSearchInput    = document.getElementById('search-input');
    const elTaskCountBadge = document.getElementById('task-count-badge');
    const elFilterTabs     = document.querySelectorAll('.filter-tab');

    // ── LocalStorage ────────────────────────────────────────────

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    // ── フィルター & 検索 ────────────────────────────────────────

    function getFilteredTasks() {
      return tasks.filter(function (task) {
        var matchesFilter =
          currentFilter === 'all' ||
          (currentFilter === 'active'    && !task.completed) ||
          (currentFilter === 'completed' &&  task.completed);

        var q = searchQuery.toLowerCase();
        var matchesSearch = !q ||
          task.title.toLowerCase().includes(q) ||
          task.memo.toLowerCase().includes(q);

        return matchesFilter && matchesSearch;
      });
    }

    // ── レンダリング ─────────────────────────────────────────────

    function updateFilterTabs() {
      elFilterTabs.forEach(function (tab) {
        if (tab.dataset.filter === currentFilter) {
          tab.style.color          = '#3b82f6';
          tab.style.borderBottomColor = '#3b82f6';
          tab.style.fontWeight     = '600';
        } else {
          tab.style.color          = '#374151';
          tab.style.borderBottomColor = 'transparent';
          tab.style.fontWeight     = '400';
        }
      });
    }

    function renderTasks() {
      var filtered = getFilteredTasks();

      elTaskCountBadge.textContent = tasks.filter(function (t) { return !t.completed; }).length;

      elTaskList.innerHTML = '';

      if (filtered.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'text-center py-12 text-sm text-gray-500';
        empty.textContent = tasks.length === 0
          ? 'タスクを追加してみましょう！'
          : '条件に一致するタスクがありません';
        elTaskList.appendChild(empty);
        return;
      }

      filtered.forEach(function (task) {
        elTaskList.appendChild(createTaskCard(task));
      });
    }

    function createTaskCard(task) {
      var card = document.createElement('div');
      card.className = 'bg-white rounded-lg shadow border border-gray-300 p-4 flex items-start gap-3';
      card.dataset.id = task.id;
      card.style.opacity    = '0';
      card.style.transition = 'opacity 0.25s ease';

      // ドラッグハンドル
      var handle = document.createElement('div');
      handle.className = 'drag-handle flex-shrink-0 text-gray-400 hover:text-gray-600 cursor-grab mt-1 select-none touch-none';
      handle.innerHTML =
        '<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">' +
        '<circle cx="4" cy="2.5" r="1.2"/><circle cx="10" cy="2.5" r="1.2"/>' +
        '<circle cx="4" cy="7"   r="1.2"/><circle cx="10" cy="7"   r="1.2"/>' +
        '<circle cx="4" cy="11.5" r="1.2"/><circle cx="10" cy="11.5" r="1.2"/>' +
        '</svg>';

      // チェックボックス
      var checkbox = document.createElement('input');
      checkbox.type    = 'checkbox';
      checkbox.checked = task.completed;
      checkbox.className = 'flex-shrink-0 w-5 h-5 mt-0.5 rounded cursor-pointer';
      checkbox.style.accentColor = '#3b82f6';
      checkbox.addEventListener('change', function () { handleToggle(task.id); });

      // テキストエリア
      var content = document.createElement('div');
      content.className = 'flex-1 min-w-0';

      var title = document.createElement('p');
      title.className  = 'text-base font-medium break-words';
      title.textContent = task.title;
      title.style.color          = task.completed ? '#9ca3af' : '#1f2937';
      title.style.textDecoration = task.completed ? 'line-through' : 'none';
      content.appendChild(title);

      if (task.memo) {
        var memo = document.createElement('p');
        memo.className    = 'text-sm text-gray-500 mt-1 break-words whitespace-pre-wrap';
        memo.textContent  = task.memo;
        content.appendChild(memo);
      }

      // 削除ボタン
      var deleteBtn = document.createElement('button');
      deleteBtn.className = 'flex-shrink-0 text-gray-400 hover:text-red-500 transition-colors p-1 -mr-1 rounded';
      deleteBtn.setAttribute('aria-label', 'タスクを削除');
      deleteBtn.innerHTML =
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
        'stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<polyline points="3 6 5 6 21 6"/>' +
        '<path d="M19 6l-1 14H6L5 6"/>' +
        '<path d="M10 11v6M14 11v6"/>' +
        '<path d="M9 6V4h6v2"/>' +
        '</svg>';
      deleteBtn.addEventListener('click', function () { handleDelete(task.id, card); });

      card.appendChild(handle);
      card.appendChild(checkbox);
      card.appendChild(content);
      card.appendChild(deleteBtn);

      // フェードイン（完了タスクは半透明）
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          card.style.opacity = task.completed ? '0.45' : '1';
        });
      });

      return card;
    }

    // ── イベントハンドラ ─────────────────────────────────────────

    function handleAdd() {
      var title = elTitleInput.value.trim();
      if (!title) {
        elTitleInput.style.outline       = '2px solid #fca5a5';
        elTitleInput.style.outlineOffset = '2px';
        elTitleInput.style.borderRadius  = '4px';
        setTimeout(function () {
          elTitleInput.style.outline       = '';
          elTitleInput.style.outlineOffset = '';
          elTitleInput.style.borderRadius  = '';
        }, 1500);
        elTitleInput.focus();
        return;
      }

      var task = {
        id:        generateId(),
        title:     title,
        memo:      elMemoInput.value.trim(),
        completed: false,
        createdAt: new Date().toISOString()
      };

      tasks.push(task);
      saveTasks();

      elTitleInput.value = '';
      elMemoInput.value  = '';
      if (memoVisible) toggleMemo();

      renderTasks();
      elTitleInput.focus();
    }

    function handleToggle(id) {
      tasks = tasks.map(function (t) {
        return t.id === id ? Object.assign({}, t, { completed: !t.completed }) : t;
      });
      saveTasks();
      renderTasks();
    }

    function handleDelete(id, card) {
      card.style.transition = 'opacity 0.2s ease';
      card.style.opacity    = '0';
      setTimeout(function () {
        tasks = tasks.filter(function (t) { return t.id !== id; });
        saveTasks();
        renderTasks();
      }, 200);
    }

    function toggleMemo() {
      memoVisible               = !memoVisible;
      elMemoInput.style.display = memoVisible ? 'block' : 'none';
      elMemoToggle.textContent  = memoVisible ? '－ メモを非表示' : '＋ メモを追加';
      if (memoVisible) elMemoInput.focus();
    }

    // ── SortableJS ───────────────────────────────────────────────

    function initSortable() {
      new Sortable(elTaskList, {
        handle:     '.drag-handle',
        animation:  150,
        ghostClass: 'sortable-ghost',
        onEnd: function () {
          var visibleIds = Array.from(elTaskList.querySelectorAll('[data-id]'))
            .map(function (el) { return el.dataset.id; });
          var notVisible = tasks.filter(function (t) { return !visibleIds.includes(t.id); });
          var reordered  = visibleIds
            .map(function (id) { return tasks.find(function (t) { return t.id === id; }); })
            .filter(Boolean);
          tasks = reordered.concat(notVisible);
          saveTasks();
        }
      });
    }

    // ── 初期化 ───────────────────────────────────────────────────

    function init() {
      tasks = loadTasks();
      updateFilterTabs();
      renderTasks();
      initSortable();

      elAddBtn.addEventListener('click', handleAdd);

      elTitleInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleAdd();
        }
      });

      elTitleInput.addEventListener('input', function () {
        elTitleInput.style.outline       = '';
        elTitleInput.style.outlineOffset = '';
      });

      elMemoToggle.addEventListener('click', toggleMemo);

      elSearchInput.addEventListener('input', function (e) {
        searchQuery = e.target.value;
        renderTasks();
      });

      elFilterTabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          currentFilter = tab.dataset.filter;
          updateFilterTabs();
          renderTasks();
        });
      });
    }

    init();
  })();
  </script>
</body>
</html>
